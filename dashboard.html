<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Sayohat</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="admin.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="container">
                <div class="brand">Sayohat Admin</div>
                <nav>
                    <ul class="sidebar-nav">
                        <li><a class="btn-link active-link" href="dashboard.html">Dashbord</a></li>
                        <li><a class="btn-link" href="clients.html">Mijozlar</a></li>
                        <li><a class="btn-link" href="packages.html">Paketlar</a></li>
                        <li><a class="btn-link" href="bookings.html">Bronlar</a></li>
                        <li><a class="btn-link" href="index.html">SAYTGA QAYTISH</a></li>
                    </ul>
                </nav>
                <div class="sidebar-footer">
                    <button id="logout" class="btn btn-secondary">Chiqish</button>
                </div>
            </div>
        </aside>

        <main class="dashboard-root">
            <div class="container">
                <header class="dashboard-header">
                    <div>
                        <h1>Admin panel</h1>
                        <p class="small-text">Sayohat Agentligi boshqaruv paneli</p>
                    </div>
                    <div class="dashboard-tools">
                        <input class="dashboard-search" placeholder="Qidirish..." />
                        <div class="dashboard-meta">
                            <div class="avatar">A</div>
                        </div>
                    </div>
                </header>

                <section class="dashboard-widgets">
                    <article class="card">
                        <h3>Mijozlar</h3>
                        <p class="small-text">Jami mijozlar</p>
                        <div class="widget-value"><span id="clients-count">0</span></div>
                    </article>
                    <article class="card">
                        <h3>Paketlar</h3>
                        <p class="small-text">Jami paketlar</p>
                        <div class="widget-value"><span id="packages-count">0</span></div>
                    </article>
                    <article class="card">
                        <h3>Bronlar</h3>
                        <p class="small-text">Jami bronlar</p>
                        <div class="widget-value"><span id="bookings-count">0</span></div>
                    </article>
                    <article class="card">
                        <h3>So'ngi foydalanuvchi</h3>
                        <p class="small-text">Tizimga oxirgi kirgan</p>
                        <div class="widget-subtitle" id="last-user">-</div>
                    </article>
                </section>

                <section>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="clients">Mijozlar</button>
                        <button class="tab-btn" data-tab="packages">Paketlar</button>
                        <button class="tab-btn" data-tab="bookings">Bronlar</button>
                    </div>

                    <div class="tab-content active" id="clients-tab">
                        <div class="panel-actions">
                            <button id="add-client" class="btn btn-primary">Mijoz qo'shish</button>
                        </div>
                        <div id="clients-list" class="table-responsive"></div>
                    </div>

                    <div class="tab-content" id="packages-tab">
                        <div class="panel-actions">
                            <button id="add-package" class="btn btn-primary">Paket qo'shish</button>
                        </div>
                        <div id="packages-dashboard" class="table-responsive"></div>
                    </div>

                    <div class="tab-content" id="bookings-tab">
                        <div class="panel-actions">
                            <button id="add-booking" class="btn btn-primary">Bron qo'shish</button>
                        </div>
                        <div id="bookings-list" class="table-responsive"></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="edit-title">Elementni tahrirlash</h3>
                <button id="close-edit-modal" class="close-btn">×</button>
            </div>
            <div class="modal-body" id="edit-body"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
